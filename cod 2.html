<!DOCTYPE html>
<html lang="fr">
<head>
 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loto Express - Jeu</title>
    
    <link rel="stylesheet" href="st2.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Loto web Game</div>
        <ul class="menu">
            <li>Score: <span id="total-points">0</span> pts</li>
        </ul>
    </nav> 

    <section class="game-container">
        <h1>🎯 Loto Express</h1>
        
        <div id="setup-zone">
            <p>Choisis tes 3 numéros (1 à 100) :</p>
            <div class="inputs">
                <input type="number" id="num1" min="1" max="100" placeholder="N°1">
                <input type="number" id="num2" min="1" max="100" placeholder="N°2">
                <input type="number" id="num3" min="1" max="100" placeholder="N°3">
            </div>
            <button onclick="validerChoix()">Commencer le tirage</button>
        </div>

        <div id="play-zone" style="display:none;">
            <p>Tes numéros : <b id="display-nums"></b></p>
            <div class="stats">Essais : <span id="essais">5</span></div>
            
            <div id="resultat">--</div>
            
            <button id="btn-generer" onclick="tirage()">TAP pour Tirage</button>
            <p id="message"></p>
            <button id="btn-restart" onclick="resetJeu()" style="display:none;">Nouvelle Partie 🔄</button>
        </div>
    </section>

    <audio id="click-sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

    <script>
        let essais = 5;
        let score = 0;
        let mesNumeros = [];

        function validerChoix() {
            const n1 = parseInt(document.getElementById('num1').value);
            const n2 = parseInt(document.getElementById('num2').value);
            const n3 = parseInt(document.getElementById('num3').value);

            if (!n1 || !n2 || !n3) {
                alert("Remplis les 3 cases !");
                return;
            }

            mesNumeros = [n1, n2, n3];
            document.getElementById('display-nums').innerText = mesNumeros.join(" - ");
            document.getElementById('setup-zone').style.display = "none";
            document.getElementById('play-zone').style.display = "block";
        }

        function tirage() {
            if (essais > 0) {
                // Jouer le son              document.getElementById('click-sound').play();
                
                const hasard = Math.floor(Math.random() * 100) + 1;
                const resDiv = document.getElementById('resultat');
                const msg = document.getElementById('message');
                
                resDiv.innerText = hasard;
                resDiv.classList.add('animation-pop'); // Petite animation
                setTimeout(() => resDiv.classList.remove('animation-pop'), 300);

                essais--;
                document.getElementById('essais').innerText = essais;

                // Vérifier si gagné
                if (mesNumeros.includes(hasard)) {
                    score += 10;
                    document.getElementById('total-points').innerText = score;
                    msg.innerText = "BRAVO ! +10 pts 🌟";
                    msg.style.color = "#2ed573";
                } else {
                    msg.innerText = "Raté...";
                    msg.style.color = "white";
                }

                if (essais === 0) {
                    document.getElementById('btn-generer').style.display = "none";
                    document.getElementById('btn-restart').style.display = "inline-block";
                    msg.innerText = "Partie finie ! Score final : " + score;
                }
            }
        }

        function resetJeu() {
            essais = 5;
            score = 0;
            document.getElementById('total-points').innerText = "0";
            document.getElementById('essais').innerText = "5";
            document.getElementById('resultat').innerText = "--";
            document.getElementById('message').innerText = "";
            document.getElementById('setup-zone').style.display = "block";
            document.getElementById('play-zone').style.display = "none";
            document.getElementById('btn-generer').style.display = "inline-block";
            document.getElementById('btn-restart').style.display = "none";
        }
    </script>
</body>
</html>
